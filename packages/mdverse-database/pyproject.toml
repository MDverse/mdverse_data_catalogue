[project]
name = "mdverse-database"
version = "0.1.0"
description = "MDverse dataase"
requires-python = ">=3.12"
dependencies = [
    "fastparquet>=2024.11.0",
    "pandas>=2.2.3",
    "pyarrow>=19.0.0",
    "sqlmodel>=0.0.24",
    "tqdm>=4.67.1",
]

[project.scripts]
database-create = "mdverse_database.create_database:main"
database_ingest = "mdverse_database.ingest_data:main"
database-report = "mdverse_database.report:main"
