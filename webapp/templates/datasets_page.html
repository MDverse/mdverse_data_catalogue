{% extends "base.html" %}

{% block head_extra %}
<!-- Ellipsis -->
<style>
    .ellipsis {
        max-width: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
</style>
{% endblock %}

{% block main %}
<section class="section">
    <h1>Datasets</h1>

    <table id="datasets_table" class="table is-striped is-hoverable is-size-8" style="width:100%;">
        <thead>
            <tr>
                <th class="is-vcentered">view dataset</th>
                <th class="is-vcentered has-text-left">source</th>
                <th class="is-vcentered has-text-left">source id</th>
                <th class="is-vcentered has-text-left">title</th>
                <th class="is-vcentered">created</th>
                <th class="is-vcentered">files</th>
                <th class="is-vcentered has-text-left">description</th>
                <th class="is-vcentered has-text-left">author(s)</th>
            </tr>
        </thead>
    </table>
</section>
{% endblock %}


{% block script_extra %}
<script type="text/javascript">
    $('#datasets_table').DataTable({
        ajax: '/datasets/datatables',
        processing: true,
        serverSide: true,
        columns: [
            { // view details
                data: 'dataset_id',
                render: function(data, type, row) {
                    // data: the entire row data
                    return '<a href="/datasets/' + data + '" target="_blank" >🔍</a>';
                }
            },
            { // origin
                data: 'dataset_origin'
            },
            { // id in origin
                data: 'id_in_data_source',
                render: function(data, type, row) {
                    // data: dataset_id_in_origin
                    // row: the entire row data, including dataset_url
                    return '<a href="' + row.url + '" target="_blank">' + data + '</a>';
                }
            },
            { // title
                data: 'title',
                render: $.fn.dataTable.render.ellipsis(35),
            },
            { // date created
                 data: 'date_created'
            },
            { // number of files
                data: 'file_number'
            },
            { // description
                data: 'description',
                render: $.fn.dataTable.render.ellipsis(30),
            },
            { // author(s)
                data: 'author',
                render: $.fn.dataTable.render.ellipsis(12),
            },
        ],
        orderClasses: false,
        autoWidth: false,
        scrollX: true,
        columnDefs: [
            { width:  '5%', targets:  0, orderable: false },  // details button
            { width:  '6%', targets:  1 },  // dataset origin
            { width:  '8%', targets:  2 },  // dataset id in origin
            { width: '28%', targets:  3 },  // title
            { width: '10%', targets:  4 },  // date created
            { width:  '1%', targets:  5 },  // number of files
            { width: '30%', targets:  6 },  // description
            { width: '12%', targets:  7 },  // authors
            { className: 'dt-center', targets: "_all" },  // center align all columns
            { className: 'has-text-left', targets: [1, 2, 3, 6, 7] },  // left align source, source id, title, description, and authors columns
        ],
        // https://datatables.net/reference/option/drawCallback
        "drawCallback": function(settings) {
            htmx.process('#datasets_table');
        },
    });
</script>
{% endblock %}
